<svg xmlns="http://www.w3.org/2000/svg" width="1584" height="396" viewBox="0 0 1584 396">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#060e1f"/>
      <stop offset="50%" stop-color="#0a1628"/>
      <stop offset="100%" stop-color="#0f1f3d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <radialGradient id="glow" cx="80%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#1d4ed8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0a1628" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fade-left" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#060e1f" stop-opacity="1"/>
      <stop offset="100%" stop-color="#060e1f" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1584" height="396" fill="url(#bg)"/>
  <rect width="1584" height="396" fill="url(#glow)"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="5" height="396" fill="url(#accent)"/>

  <!-- Subtle horizontal rule top and bottom -->
  <rect x="0" y="0" width="1584" height="1" fill="#1e3a5f" opacity="0.5"/>
  <rect x="0" y="395" width="1584" height="1" fill="#1e3a5f" opacity="0.5"/>

  <!-- Left side: faint bank name watermarks -->
  <text x="40" y="100" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#ffffff" fill-opacity="0.04" letter-spacing="3">JPMORGAN CHASE</text>
  <text x="40" y="130" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#ffffff" fill-opacity="0.04" letter-spacing="3">GOLDMAN SACHS</text>
  <text x="40" y="160" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#ffffff" fill-opacity="0.04" letter-spacing="3">MORGAN STANLEY</text>
  <text x="40" y="190" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#ffffff" fill-opacity="0.04" letter-spacing="3">BANK OF AMERICA</text>
  <text x="40" y="220" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#ffffff" fill-opacity="0.04" letter-spacing="3">CITIGROUP</text>
  <text x="40" y="250" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#ffffff" fill-opacity="0.04" letter-spacing="3">DEUTSCHE BANK</text>
  <text x="40" y="280" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#ffffff" fill-opacity="0.04" letter-spacing="3">BARCLAYS</text>
  <text x="40" y="310" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#ffffff" fill-opacity="0.04" letter-spacing="3">WELLS FARGO</text>
  <text x="40" y="340" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#ffffff" fill-opacity="0.04" letter-spacing="3">HOULIHAN LOKEY</text>

  <!-- Fade overlay left side to blend watermarks -->
  <rect x="0" y="0" width="600" height="396" fill="url(#fade-left)"/>

  <!-- Vertical divider line -->
  <rect x="860" y="48" width="1" height="300" fill="#1e3a5f" opacity="0.6"/>

  <!-- RIGHT SIDE — main content -->
  <!-- Pete's Postings label -->
  <text x="1544" y="128" font-family="Inter, sans-serif" font-size="15" font-weight="700" fill="#3b82f6" text-anchor="end" letter-spacing="3">PETE'S POSTINGS</text>

  <!-- Main headline -->
  <text x="1544" y="210" font-family="Inter, sans-serif" font-size="58" font-weight="800" fill="#ffffff" text-anchor="end" letter-spacing="-1.5">Every major bank.</text>
  <text x="1544" y="274" font-family="Inter, sans-serif" font-size="58" font-weight="800" fill="#3b82f6" text-anchor="end" letter-spacing="-1.5">One place.</text>

  <!-- Tagline -->
  <text x="1544" y="326" font-family="Inter, sans-serif" font-size="20" font-weight="400" fill="#64748b" text-anchor="end" letter-spacing="0.2">Real-time analyst &amp; internship alerts · petespostings.com</text>
</svg>
