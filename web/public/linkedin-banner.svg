<svg xmlns="http://www.w3.org/2000/svg" width="1584" height="396" viewBox="0 0 1584 396">
  <!-- Background -->
  <rect width="1584" height="396" fill="#0f172a"/>

  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1584" height="396" fill="url(#grid)"/>

  <!-- Blue accent top bar -->
  <rect x="0" y="0" width="1584" height="5" fill="#2563eb"/>

  <!-- Main title — centered, pushed right of where profile pic sits -->
  <text
    x="792"
    y="178"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="86"
    font-weight="800"
    fill="white"
    text-anchor="middle"
    letter-spacing="-3"
  >Pete's Postings</text>

  <!-- Tagline -->
  <text
    x="792"
    y="248"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="34"
    font-weight="400"
    fill="#94a3b8"
    text-anchor="middle"
  >Banking analyst &amp; intern job alerts — before anyone else.</text>

  <!-- URL -->
  <text
    x="792"
    y="310"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="26"
    font-weight="600"
    fill="#2563eb"
    text-anchor="middle"
  >petespostings.com</text>
</svg>
